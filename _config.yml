###########################################################
### Welcome to Beautiful Jekyll!
### This config file is meant for settings that affect your entire website. When you first
### set up your website you should go through all these settings and edit them, but after
### the initial set up you won't need to come back to this file often.
###########################################################

############################
# --- Required options --- #
############################

# Name of website
title: Camilo Cabrera

# Your name to show in the footer
author: Camilo Cabrera

###############################################
# --- List of links in the navigation bar --- #
###############################################

navbar-links:
  Blog: ""
  About Me / Contact: "aboutme"
  Services: "services"
  Credits: "credits"

################
# --- Logo --- #
################

# Image to show in the navigation bar - works best with a square image
# Remove this parameter if you don't want an image in the navbar
avatar: "/assets/img/avatar.jpg"

# By default, the image is cut into a circle. You can disable this behaviour by setting 'round-avatar: false'
round-avatar: true

# If you want to have an image logo in the top-left corner instead of having the title of the website,
# then specify the following parameter
#title-img: /path/to/image


#####################################
# --- Footer social media links --- #
#####################################

# Select the social network links that you want to show in the footer.
# You can change the order that they show up on the page by changing the order here.
# Uncomment the links you want to show and add your information to each one.
social-network-links:
  email: "cecabrera55@gmail.com"
  linkedin: camilo-cabrera
  github: cecabrera
  calendly: "cecabrera55/meeting"
#  rss: true
#  twitter: CamiloECabrera
#  facebook: cecabrera55
#  instagram: yourname
#  youtube: "@yourname"
#  telephone: "+573164711686"

# If you want your website to generate an RSS feed, provide a description
# The URL for the feed will be https://<your_website>/feed.xml
rss-description: "Data science, analytics, machine learning and business intelligence projects using R, Python, Shiny, Pandas and D3."

###########################
# --- General options --- #
###########################

# Short description of your site (used for SEO + in some footers)
description: "Web page for people who is looking for someone to execute data science, business intelligence, analytics, dashboards, visualizations projects using R, Python, Shiny, Pandas and D3."

# The keywords to associate with your website, for SEO purposes
keywords: "analytics, big data, machine learning, deep learning, artificial intelligence, business intelligence, rstats, r, r shiny, shiny apps, r shiny apps, shiny developer, r shiny developer, shiny consultant, python, pandas, dashboards, tableau, consultant, javascript, d3, dc"

# Select which social network share links to show in posts
share-links-active:
  twitter: true
  facebook: true
  linkedin: true
  vk: false
  reddit: false

# How to display the link to your website in the footer
# Remove this if you don't want a link in the footer
url-pretty: "camicabrera.com"

# Add the website title to the title of every page
title-on-all-pages: true

# Excerpt word length - Truncate the excerpt of each post on the feed page to the specified number of words
excerpt_length: 50

# Whether or not to show an excerpt for every blog post in the feed page
feed_show_excerpt: true

# Whether or not to show a list of tags below each post preview in the feed page
feed_show_tags: true

# Add a search button to the navbar
post_search: true

# Add a button in the footer to edit the current page. Only works if your website is hosted on GitHub
edit_page_button: false

# Allow sub-menu items (second-level navigation menu items) to be longer than the top-level menu
navbar-var-length: false

######################################
# --- Colours / background image --- #
######################################

page-col: "#FFFFFF"
text-col: "#404040"
link-col: "#008AFF"
hover-col: "#0085A1"
navbar-col: "#EAEAEA"
navbar-text-col: "#404040"
navbar-border-col: "#DDDDDD"
footer-col: "#EAEAEA"
footer-text-col: "#777777"
footer-link-col: "#404040"
footer-hover-col: "#0085A1"

#################################
# --- Web Analytics Section --- #
#################################

# Google Analytics 4 measurement ID (replaces the deprecated Universal Analytics `google_analytics` below).
# TODO: replace with your GA4 Measurement ID (format: G-XXXXXXXXXX)
#gtag: "G-XXXXXXXXXX"

# Google Universal Analytics ID -- deprecated since July 2023
# Kept here for historical reference; migrate to `gtag` above.
#google_analytics: "UA-96863244-1"

####################
# --- Comments --- #
####################

# Disqus shortname (NOT the userid)
disqus: "cecabrera-github-io"

################
# --- Misc --- #
################

# Ruby Date Format to show dates of posts
date_format: "%B %-d, %Y"

#################################################################################
# --- You don't need to touch anything below here (but you can if you want) --- #
#################################################################################

# Output options (more information on Jekyll's site)
url: "https://camicabrera.com"
baseurl: ""
timezone: "America/Bogota"
markdown: kramdown
highlighter: rouge
permalink: /:year-:month-:day-:title/
paginate: 5

kramdown:
  input: GFM

# Default YAML values (more information on Jekyll's site)
defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: true
      social-share: true
  -
    scope:
      path: ""
    values:
      layout: "page"
      show-avatar: true

# Exclude these files from production site
exclude:
  - CHANGELOG.md
  - CNAME
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - screenshot.png
  - docs/
  - Vagrantfile

plugins:
  - jekyll-paginate
  - jekyll-sitemap

# prose.io config
prose:
  rooturl: '_posts'
  media: 'assets/img'
  ignore:
    - 404.html
    - LICENSE
    - feed.xml
    - _config.yml
    - /_layouts
    - /_includes
    - /assets
    - /js
  metadata:
    _posts:
      - name: "layout"
        field:
          element: "hidden"
          value: "post"
      - name: "title"
        field:
          element: "text"
          label: "Post title"
          placeholder: "Title"
          alterable: true
      - name: "subtitle"
        field:
          element: "textarea"
          label: "Subtitle"
          placeholder: "A description of your post."
          alterable: true
      - name: "date"
        field:
          element: "text"
          label: "Date"
          help: "Enter date of post."
          placeholder: "yyyy-mm-dd"
          alterable: true
      - name: "published"
        field:
          element: "checkbox"
          label: "Publish"
          help: "Check to publish post, uncheck to hide."

